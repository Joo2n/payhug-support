<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이허그 고객센터</title>
  <meta name="description" content="페이허그 선정산 서비스 고객센터 — 가입, 서류 등록, 매출 조회, 선정산 이용 안내" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="#/">
        <img src="assets/logo-payhug.png" alt="PayHug" />
        <span class="brand-suffix">고객센터</span>
      </a>
      <div class="header-actions">
        <button id="header-search" class="btn-icon" aria-label="검색">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        </button>
        <a class="btn-primary" href="https://payhug.io" target="_blank" rel="noopener">
          페이허그 바로가기
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </a>
      </div>
    </div>
  </header>

  <div id="search-modal" class="search-modal" aria-hidden="true">
    <div class="modal-panel">
      <input type="search" placeholder="아티클 제목, 내용 검색" autocomplete="off" />
      <div class="modal-results"></div>
    </div>
  </div>

  <main id="app"></main>

  <footer class="site-footer">
    <div class="wrap" id="footer-info"><!-- app.js 렌더 --></div>
  </footer>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
