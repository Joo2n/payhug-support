<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>정책폼 모바일 QA</title></head>
<body style="margin:0">
<!-- macOS 헤드리스는 --window-size 최소폭을 500px로 클램프하므로 375px 검증은 same-origin iframe으로 한다 -->
<iframe id="f" src="../policy/index.html" style="width:375px;height:812px;border:0"></iframe>
<pre id="out">RUNNING</pre>
<script>
const out=[];const log=(n,ok,i)=>out.push(`${ok?"PASS":"FAIL"} ${n}${i?" — "+i:""}`);
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
async function waitFor(fn,t=8000,s=100){const t0=Date.now();while(Date.now()-t0<t){try{const v=fn();if(v)return v}catch(e){}await sleep(s)}return null}
(async()=>{
try{
  const f=document.getElementById("f");
  await waitFor(()=>{const d=f.contentDocument;return d&&d.getElementById("preview")&&d.getElementById("preview").textContent.includes("접수 정보")},10000);
  const W=f.contentWindow,D=f.contentDocument;
  const cs=(el)=>W.getComputedStyle(el);
  const fab=D.getElementById("fab"),act=D.getElementById("actions"),bd=D.getElementById("sheet-bd");

  // 1. 375px에서 FAB 노출, 시트는 화면 밖
  log("mobile:fab-visible", cs(fab).display==="flex", cs(fab).display);
  const fr=fab.getBoundingClientRect();
  log("mobile:fab-small", fr.width<=56&&fr.height<=56, Math.round(fr.width)+"x"+Math.round(fr.height));
  log("mobile:fab-bottom-right", fr.right>375-40 && fr.bottom>812-90, "r="+Math.round(fr.right)+" b="+Math.round(fr.bottom));
  log("mobile:sheet-hidden", !act.classList.contains("open"));
  const ar=act.getBoundingClientRect();
  log("mobile:sheet-offscreen", ar.top>=812-8, "top="+Math.round(ar.top));

  // 2. 폼이 시트에 가리지 않는지 — 첫 입력칸이 화면 안에 있어야 함
  const ti=D.getElementById("title").getBoundingClientRect();
  log("mobile:title-visible", ti.bottom<812 && ti.top>0, "top="+Math.round(ti.top)+" bottom="+Math.round(ti.bottom));

  // 3. FAB 탭 → 시트 열림 + 백드롭
  fab.click(); await sleep(350);
  log("mobile:sheet-opens", act.classList.contains("open"));
  log("mobile:backdrop-on", bd.classList.contains("on"));
  log("mobile:aria-expanded", fab.getAttribute("aria-expanded")==="true");
  const ar2=act.getBoundingClientRect();
  log("mobile:sheet-onscreen", ar2.top<812-100, "top="+Math.round(ar2.top));
  log("mobile:sheet-not-half", ar2.height<812*0.55, "높이 "+Math.round(ar2.height)+"/812");

  // 4. 백드롭 탭 → 닫힘
  bd.click(); await sleep(350);
  log("mobile:backdrop-closes", !act.classList.contains("open"));

  // 5. 빈 상태 제출 → 시트 닫히고 미입력 항목으로 이동
  let opened=0; W.open=function(){opened++;return null};
  fab.click(); await sleep(300);
  D.getElementById("btn-gh").click(); await sleep(400);
  log("mobile:invalid-blocks", opened===0);
  log("mobile:invalid-closes-sheet", !act.classList.contains("open"));
  log("mobile:invalid-toast", /입력해 주세요/.test(D.getElementById("toast").textContent));

  // 6. 채운 뒤 제출 → 열리고 시트 닫힘
  const set=(id,v)=>{const el=D.getElementById(id);el.value=v;el.dispatchEvent(new W.Event("input",{bubbles:true}));el.dispatchEvent(new W.Event("change",{bubbles:true}))};
  set("title","모바일 테스트");set("category","수수료");set("type","변경");
  set("body","내용");set("source","출처");set("author","QA");
  await sleep(150);
  let url=""; W.open=function(u){url=u;opened++;return null};
  fab.click(); await sleep(300);
  D.getElementById("btn-gh").click(); await sleep(400);
  log("mobile:submit-opens", opened===1, "open "+opened);
  log("mobile:submit-private", url.includes("payhug-policy-inbox"));
  log("mobile:submit-closes-sheet", !act.classList.contains("open"));

  // 7. 가로 스크롤 없어야 함
  log("mobile:no-hscroll", D.documentElement.scrollWidth<=376, "scrollWidth="+D.documentElement.scrollWidth);
}catch(e){out.push("FAIL runner:exception — "+e.message)}
const fails=out.filter(l=>l.startsWith("FAIL")).length;
document.getElementById("out").textContent=out.join("\n")+`\nDONE ${fails} FAILS`;
document.title=`QA_DONE_${fails}`;
})();
</script></body></html>
